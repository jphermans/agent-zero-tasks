<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sudoku</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;margin:0;padding:10px;display:flex;flex-direction:column;align-items:center}
.c{background:#fff;border-radius:20px;padding:15px;box-shadow:0 10px 40px rgba(0,0,0,.2);max-width:400px;width:100%}
h1{text-align:center;color:#333;margin:0 0 5px;font-size:1.4em}
.d{text-align:center;color:#666;margin-bottom:15px;font-size:.9em}
.g{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:#000;border:3px solid #000;border-radius:8px;overflow:hidden;margin-bottom:15px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#fff;font-size:1.5em;font-weight:bold;cursor:pointer}
.cell.fx{background:#f0f0f0;color:#333}
.cell.ed{color:#0066cc}
.cell.sel{background:#bbdefb!important}
.cell.err{background:#ffcdd2!important}
.cell.ok{background:#c8e6c9!important}
.cell:nth-child(3n){border-right:2px solid #000}
.cell:nth-child(9n){border-right:none}
.cell:nth-child(n+19):nth-child(-n+27),.cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid #000}
.np{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:15px}
.nb{padding:15px;font-size:1.3em;font-weight:bold;border:none;border-radius:10px;background:#e3f2fd;color:#1565c0;cursor:pointer}
.nb:active{background:#1565c0;color:#fff}
.nb.cl{background:#ffebee;color:#c62828}
.nb.cl:active{background:#c62828;color:#fff}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px;font-size:1em;font-weight:bold;border:none;border-radius:10px;cursor:pointer}
.btn:active{transform:scale(.95)}
.bc{background:#e8f5e9;color:#2e7d32}
.bs{background:#fff3e0;color:#e65100}
.br{background:#fce4ec;color:#c2185b}
.msg{text-align:center;padding:10px;border-radius:10px;margin-top:10px;font-weight:bold;display:none}
.msg.suc{background:#c8e6c9;color:#2e7d32;display:block}
.msg.inf{background:#e3f2fd;color:#1565c0;display:block}
.save{text-align:center;color:#666;font-size:.8em;margin-top:10px}
</style>
</head>
<body>
<div class="c">
<h1>Sudoku</h1>
<div class="d">2026-03-28</div>
<div class="g" id="g"></div>
<div class="np">
<button class="nb" onclick="en(1)">1</button>
<button class="nb" onclick="en(2)">2</button>
<button class="nb" onclick="en(3)">3</button>
<button class="nb" onclick="en(4)">4</button>
<button class="nb" onclick="en(5)">5</button>
<button class="nb" onclick="en(6)">6</button>
<button class="nb" onclick="en(7)">7</button>
<button class="nb" onclick="en(8)">8</button>
<button class="nb" onclick="en(9)">9</button>
<button class="nb cl" onclick="en(0)">X</button>
</div>
<div class="btns">
<button class="btn bc" onclick="chk()">Controleer</button>
<button class="btn bs" onclick="sol()">Oplossing</button>
</div>
<div class="btns">
<button class="btn br" onclick="clr()">Reset</button>
</div>
<div class="msg" id="m"></div>
<div class="save" id="sv">Voortgang automatisch opgeslagen</div>
<div class="save" style="margin-top:5px;font-size:0.75em;color:#999;">⭐ Gegenereerd door A0</div>
</div>
<script>
var p=[[5, 1, 0, 7, 9, 8, 0, 0, 0], [6, 0, 2, 5, 4, 3, 8, 0, 0], [9, 0, 0, 0, 2, 0, 3, 0, 0], [3, 5, 8, 2, 1, 0, 7, 4, 0], [1, 2, 0, 4, 8, 7, 6, 0, 3], [0, 6, 0, 3, 0, 9, 1, 0, 0], [2, 0, 1, 9, 0, 0, 0, 0, 0], [7, 0, 0, 8, 0, 0, 2, 0, 0], [0, 0, 5, 1, 6, 2, 9, 0, 0]],s=[[5, 1, 3, 7, 9, 8, 4, 6, 2], [6, 7, 2, 5, 4, 3, 8, 9, 1], [9, 8, 4, 6, 2, 1, 3, 7, 5], [3, 5, 8, 2, 1, 6, 7, 4, 9], [1, 2, 9, 4, 8, 7, 6, 5, 3], [4, 6, 7, 3, 5, 9, 1, 2, 8], [2, 3, 1, 9, 7, 4, 5, 8, 6], [7, 9, 6, 8, 3, 5, 2, 1, 4], [8, 4, 5, 1, 6, 2, 9, 3, 7]],key="sudoku_2026-03-28";
var u=loadProgress();
var sc=null;
function loadProgress(){
  try{
    var saved=localStorage.getItem(key);
    if(saved){
      var data=JSON.parse(saved);
      document.getElementById("sv").textContent="Voortgang hersteld van "+data.time;
      return data.grid;
    }
  }catch(e){}
  return p.map(function(r){return r.slice()});
}
function saveProgress(){
  var now=new Date();
  var time=now.getHours()+":"+(now.getMinutes()<10?"0":"")+now.getMinutes();
  try{
    localStorage.setItem(key,JSON.stringify({grid:u,time:time}));
    document.getElementById("sv").textContent="Opgeslagen om "+time;
  }catch(e){}
}
function cg(){var g=document.getElementById("g");g.innerHTML="";
for(var r=0;r<9;r++){for(var c=0;c<9;c++){var el=document.createElement("div");el.className="cell";el.dataset.r=r;el.dataset.c=c;
if(p[r][c]!==0){el.classList.add("fx");el.textContent=p[r][c]}
else{el.classList.add("ed");if(u[r][c]!==0)el.textContent=u[r][c];el.onclick=(function(rr,cc){return function(){sc={r:rr,c:cc};cg();sl(rr,cc)}})(r,c)}
g.appendChild(el)}}
if(sc){var i=sc.r*9+sc.c;document.querySelectorAll(".cell")[i].classList.add("sel")}}
function sl(r,c){document.querySelectorAll(".cell").forEach(function(e){e.classList.remove("sel")});sc={r:r,c:c};var i=r*9+c;document.querySelectorAll(".cell")[i].classList.add("sel")}
function en(n){if(!sc)return;var r=sc.r,c=sc.c;if(p[r][c]!==0)return;u[r][c]=n;saveProgress();cg();sl(r,c);
var i=r*9+c,el=document.querySelectorAll(".cell")[i];
if(n!==0&&n!==s[r][c])el.classList.add("err");else if(n!==0)el.classList.add("ok")}
function chk(){var c=0,t=0;
for(var r=0;r<9;r++){for(var cl=0;cl<9;cl++){if(p[r][cl]===0){t++;if(u[r][cl]===s[r][cl])c++}}}
var m=document.getElementById("m");
if(c===t){m.className="msg suc";m.textContent="Gefeliciteerd!"}else{m.className="msg inf";m.textContent=c+" van "+t+" goed"}}
function sol(){for(var i=0;i<9;i++){for(var j=0;j<9;j++){u[i][j]=s[i][j]}}saveProgress();cg();document.getElementById("m").className="msg inf";document.getElementById("m").textContent="Oplossing"}
function clr(){u=p.map(function(r){return r.slice()});saveProgress();cg();document.getElementById("m").className="msg inf";document.getElementById("m").textContent="Reset!"}
cg();
</script>
</body>
</html>
